<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — CourseSync</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0D0F14;
    --panel:    #13161D;
    --border:   rgba(255,255,255,0.07);
    --border-h: rgba(255,255,255,0.14);
    --text:     #E8EAF2;
    --muted:    #5C607A;
    --subtle:   #3A3E52;
    --accent:   #7EB8A4;
    --error:    #D96060;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  body::before {
    content: '';
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(126,184,164,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  .card {
    width: 100%;
    max-width: 420px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 48px 40px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: -80px;
    right: -80px;
    width: 240px;
    height: 240px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(126,184,164,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  .login-form {
    position: relative;
    z-index: 1;
    opacity: 0;
    transform: translateY(16px);
    animation: riseIn 0.7s ease 0.1s forwards;
  }

  @keyframes riseIn { to { opacity: 1; transform: translateY(0); } }

  /* Brand */
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 40px;
  }
  .brand-gem {
    width: 32px; height: 32px;
    border-radius: 8px;
    background: rgba(126,184,164,0.1);
    border: 1px solid rgba(126,184,164,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .brand-gem svg { width: 15px; height: 15px; color: var(--accent); }
  .brand-name {
    font-family: 'DM Serif Display', serif;
    font-size: 17px;
    color: var(--text);
    letter-spacing: -0.2px;
  }

  .form-title {
    font-family: 'DM Serif Display', serif;
    font-size: 24px;
    color: var(--text);
    margin-bottom: 6px;
    letter-spacing: -0.3px;
  }
  .form-sub {
    font-size: 13.5px;
    color: var(--muted);
    margin-bottom: 32px;
    line-height: 1.6;
  }

  /* Fields */
  .field { margin-bottom: 16px; }

  .field label {
    display: block;
    font-size: 11.5px;
    font-weight: 500;
    letter-spacing: 0.5px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .pw-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .pw-row label {
    font-size: 11.5px;
    font-weight: 500;
    letter-spacing: 0.5px;
    color: var(--muted);
    text-transform: uppercase;
  }
  .forgot {
    font-size: 12px;
    color: var(--accent);
    text-decoration: none;
    opacity: 0.8;
    transition: opacity 0.15s;
  }
  .forgot:hover { opacity: 1; }

  .input-wrap { position: relative; }

  .input-icon {
    position: absolute;
    left: 13px;
    top: 50%;
    transform: translateY(-50%);
    width: 15px; height: 15px;
    color: var(--subtle);
    pointer-events: none;
    transition: color 0.2s;
  }
  .input-wrap:focus-within .input-icon { color: var(--accent); }

  .field input {
    width: 100%;
    padding: 12px 13px 12px 40px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 9px;
    color: var(--text);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
  }
  .field input::placeholder { color: var(--subtle); }
  .field input:focus {
    border-color: rgba(126,184,164,0.4);
    background: rgba(126,184,164,0.04);
    box-shadow: 0 0 0 3px rgba(126,184,164,0.07);
  }

  .show-pw {
    position: absolute;
    right: 11px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--subtle);
    padding: 4px;
    display: flex;
    align-items: center;
    transition: color 0.2s;
  }
  .show-pw:hover { color: var(--text); }
  .show-pw svg { width: 15px; height: 15px; }

  /* Error state */
  .field.error input {
    border-color: rgba(217,96,96,0.45);
    background: rgba(217,96,96,0.04);
  }
  .error-msg {
    font-size: 11.5px;
    color: var(--error);
    margin-top: 6px;
    display: none;
  }
  .field.error .error-msg { display: block; }

  /* Submit */
  .submit-btn {
    width: 100%;
    padding: 13px;
    border-radius: 9px;
    border: none;
    background: var(--accent);
    color: #0C1A15;
    font-size: 14px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    letter-spacing: 0.1px;
    margin-top: 24px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
    transition: opacity 0.2s, transform 0.1s;
  }
  .submit-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
    transform: translateX(-100%);
    transition: transform 0.5s;
  }
  .submit-btn:hover::after { transform: translateX(100%); }
  .submit-btn:hover { opacity: 0.9; }
  .submit-btn:active { transform: scale(0.99); }
  .submit-btn:disabled { opacity: 0.6; cursor: default; }

  /* SSO */
  .sso-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .sso-line { flex: 1; height: 1px; background: var(--border); }
  .sso-text {
    font-size: 11px;
    color: var(--subtle);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    white-space: nowrap;
  }

  .sso-btn {
    width: 100%;
    padding: 11px 14px;
    border-radius: 9px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 9px;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
  }
  .sso-btn:hover {
    border-color: var(--border-h);
    color: var(--text);
    background: rgba(255,255,255,0.03);
  }
  .sso-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

  /* Footer */
  .form-footer {
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--subtle);
    text-align: center;
    line-height: 1.7;
  }
  .form-footer a { color: var(--muted); text-decoration: none; }
  .form-footer a:hover { color: var(--text); }
</style>
</head>
<body>

<div class="card">
  <div class="login-form">

    <div class="brand">
      <div class="brand-gem">
        <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
      </div>
      <div class="brand-name">CourseSync</div>
    </div>

    <div class="form-title">Welcome back</div>
    <div class="form-sub">Sign in with your university credentials to access your portal.</div>

    <!-- University ID -->
    <div class="field" id="field-id">
      <label for="university-id">University ID</label>
      <div class="input-wrap">
        <svg class="input-icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <path d="M10 6H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-5m-4 0V5a2 2 0 114 0v1m-4 0a2 2 0 104 0"/>
        </svg>
        <input
          type="text"
          id="university-id"
          placeholder="e.g. jm2024 or STU-2024-0847"
          autocomplete="username"
          spellcheck="false"
        >
      </div>
      <div class="error-msg">Please enter your University ID.</div>
    </div>

    <!-- Password -->
    <div class="field" id="field-pw">
      <div class="pw-row">
        <label for="password">Password</label>
        <a href="#" class="forgot">Forgot password?</a>
      </div>
      <div class="input-wrap">
        <svg class="input-icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0110 0v4"/>
        </svg>
        <input
          type="password"
          id="password"
          placeholder="Enter your password"
          autocomplete="current-password"
        >
        <button class="show-pw" type="button" id="toggle-pw" aria-label="Toggle password visibility">
          <svg id="eye-icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            <path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
          </svg>
        </button>
      </div>
      <div class="error-msg">Please enter your password.</div>
    </div>

    <button class="submit-btn" id="submit-btn" type="button">Sign in to CourseSync</button>

    <div class="sso-divider">
      <div class="sso-line"></div>
      <span class="sso-text">or continue with</span>
      <div class="sso-line"></div>
    </div>

    <button class="sso-btn" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
        <path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.35C17.25 22.15 21 17.25 21 12V7L12 2z"/>
      </svg>
      Continue with University SSO
    </button>

    <div class="form-footer">
      Protected by RBAC3 access control.<br>
      <a href="#">Privacy Policy</a> · <a href="#">Terms of Use</a> · <a href="#">IT Support</a>
    </div>

  </div>
</div>

<script>
  const toggleBtn = document.getElementById('toggle-pw');
  const pwInput   = document.getElementById('password');
  const eyeIcon   = document.getElementById('eye-icon');

  const eyeOpen   = `<path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>`;
  const eyeClosed = `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.542 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>`;

  toggleBtn.addEventListener('click', () => {
    const hidden = pwInput.type === 'password';
    pwInput.type = hidden ? 'text' : 'password';
    eyeIcon.innerHTML = hidden ? eyeClosed : eyeOpen;
  });

  document.getElementById('submit-btn').addEventListener('click', () => {
    const idField = document.getElementById('field-id');
    const pwField = document.getElementById('field-pw');
    const idVal   = document.getElementById('university-id').value.trim();
    const pwVal   = pwInput.value;

    idField.classList.toggle('error', !idVal);
    pwField.classList.toggle('error', !pwVal);

    if (idVal && pwVal) {
      const btn = document.getElementById('submit-btn');
      btn.textContent = 'Signing in…';
      btn.disabled = true;
      // POST to /api/auth/login/ goes here
    }
  });

  document.getElementById('university-id').addEventListener('input', () => {
    document.getElementById('field-id').classList.remove('error');
  });
  pwInput.addEventListener('input', () => {
    document.getElementById('field-pw').classList.remove('error');
  });
</script>
</body>
</html>
